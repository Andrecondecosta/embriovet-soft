# Render Blueprint para EmbrioVet
# Este arquivo configura automaticamente os serviços no Render

services:
  # Banco de dados PostgreSQL
  - type: pserv
    name: embriovet-db
    env: docker
    plan: free
    ipAllowList: []

  # Aplicação Streamlit
  - type: web
    name: embriovet-app
    env: python
    plan: free
    buildCommand: "pip install -r requirements_streamlit.txt"
    startCommand: "streamlit run app.py --server.port=$PORT --server.address=0.0.0.0 --server.headless=true"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DB_HOST
        fromDatabase:
          name: embriovet-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: embriovet-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: embriovet-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: embriovet-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: embriovet-db
          property: password
      - key: DATABASE_URL
        fromDatabase:
          name: embriovet-db
          property: connectionString